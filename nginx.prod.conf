server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS (uncomment when SSL cert is in place)
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    # Supabase API — proxy to Kong
    location ~ ^/(auth|rest|realtime|storage|functions|graphql)/v1 {
        proxy_pass http://kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Realtime needs WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA frontend — served from the app container's built assets
    location / {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
    }

    # Cache immutable assets
    location /assets/ {
        proxy_pass http://app:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

# Uncomment and fill in when SSL is ready:
# server {
#     listen 443 ssl http2;
#     server_name yourdomain.com;
#     ssl_certificate /etc/nginx/ssl/fullchain.pem;
#     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     # ... same location blocks as above ...
# }
