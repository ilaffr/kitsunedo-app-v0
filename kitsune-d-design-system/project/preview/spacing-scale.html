<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:grid; grid-template-columns: repeat(5,1fr); gap: 14px; align-items:end; }
.cell { display:flex; flex-direction:column; align-items:center; gap: 8px; }
.label { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: hsl(var(--muted-foreground)); font-family: ui-monospace,Menlo,monospace; }
.box { background: hsl(var(--foreground) / .1); border-radius: 2px; width: 60px; }
</style></head><body><div class="card">
<p class="eyebrow">Spacing · 4px scale</p>
<div class="row">
<div class="cell"><div class="box" style="height:4px"></div><span class="label">1 · 4px</span></div>
<div class="cell"><div class="box" style="height:8px"></div><span class="label">2 · 8px</span></div>
<div class="cell"><div class="box" style="height:16px"></div><span class="label">4 · 16px</span></div>
<div class="cell"><div class="box" style="height:24px"></div><span class="label">6 · 24px</span></div>
<div class="cell"><div class="box" style="height:40px"></div><span class="label">10 · 40px</span></div>
</div>
</div></body></html>
