<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.swatch { aspect-ratio: 1.4/1; border-radius: 2px; display:flex; flex-direction:column; justify-content:flex-end; padding: 8px 10px; color: #fff; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; box-shadow: inset 0 0 0 1px hsl(30 12% 82% / 0.6); }
.swatch .val { opacity:.75; text-transform: none; letter-spacing: .02em; font-family: ui-monospace,Menlo,monospace; font-size: 9px; margin-top: 2px; }
.swatch.light { color: hsl(var(--foreground)); }
</style></head><body><div class="card">
<p class="eyebrow">Colors · Primary palette</p>
<div class="row">
<div class="swatch" style="background:hsl(36 22% 94%)"><span class="light" style="color:hsl(var(--foreground))">Paper<br><span class="val">36 22% 94%</span></span></div>
<div class="swatch light" style="background:hsl(38 30% 97%)">Card<br><span class="val">38 30% 97%</span></div>
<div class="swatch" style="background:hsl(30 8% 12%)">Ink<br><span class="val">30 8% 12%</span></div>
<div class="swatch" style="background:hsl(5 78% 42%)">Vermillion<br><span class="val">5 78% 42%</span></div>
<div class="swatch light" style="background:hsl(32 14% 89%)">Muted<br><span class="val">32 14% 89%</span></div>
</div>
</div></body></html>
