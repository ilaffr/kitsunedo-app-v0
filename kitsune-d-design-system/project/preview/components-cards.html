<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card-ex { padding: 16px 18px; position: relative; overflow: hidden; }
.card-ex .eye { font-size: 9px; letter-spacing: .32em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin:0 0 6px; }
.card-ex .title { font-family: var(--font-serif); font-weight: 500; letter-spacing: .03em; font-size: 17px; margin: 0; color: hsl(var(--foreground)); }
.card-ex p { font-size: 12px; color: hsl(var(--muted-foreground)); margin: 4px 0 0; }
.wm { position:absolute; right: -10px; bottom: -24px; font-family: var(--font-serif); font-size: 84px; color: hsl(var(--foreground) / .05); line-height: 1; pointer-events:none; }
</style></head><body><div class="card">
<p class="eyebrow">Components · Washi card</p>
<div class="row">
<div class="washi-card card-ex">
  <p class="eye">Daily Practice</p>
  <h3 class="title">今日の道</h3>
  <p>Honor demands dedication.</p>
  <span class="wm">道</span>
</div>
<div class="washi-card card-ex">
  <p class="eye">Continue Path</p>
  <h3 class="title">Lesson 3 · 買い物</h3>
  <p>Shopping vocabulary — 18 / 32</p>
  <span class="wm">学</span>
</div>
</div>
</div></body></html>
