<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.hero { position: relative; height: 180px; overflow: hidden; }
.hero img { position:absolute; inset:0; width:100%; height:100%; object-fit: cover; opacity: .9; }
.hero .fade1 { position:absolute; inset:0; background: linear-gradient(0deg, hsl(var(--background)), hsl(var(--background) / .6), hsl(var(--background) / .1)); }
.hero .fade2 { position:absolute; inset:0; background: linear-gradient(90deg, hsl(var(--background) / .85), hsl(var(--background) / .3), transparent); }
.hero .wm { position:absolute; right: 20px; top: 20px; bottom: 20px; writing-mode: vertical-rl; font-family: var(--font-serif); font-weight: 700; color: hsl(var(--foreground) / .1); font-size: 64px; letter-spacing: .4em; }
.hero .content { position:absolute; inset: 0; padding: 20px 24px; display:flex; flex-direction: column; justify-content:flex-end; z-index: 1; }
.hero .eye { font-size: 9px; letter-spacing: .4em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0 0 6px; }
.hero h2 { font-family: var(--font-serif); font-weight: 500; font-size: 32px; letter-spacing:.08em; margin: 0; color: hsl(var(--foreground)); }
.hero .r { height: 1px; width: 64px; background: hsl(var(--foreground) / .4); margin-top: 8px; }
.hero p { font-size: 11px; color: hsl(var(--foreground) / .7); margin: 8px 0 0; font-style: italic; letter-spacing: .04em; max-width: 400px; }
</style></head><body><div class="card">
<p class="eyebrow">Brand · Hero banner</p>
<div class="hero">
<img src="../assets/hero-brush.jpg" alt="">
<div class="fade1"></div>
<div class="fade2"></div>
<span class="wm">羊蹄</span>
<div class="content">
<p class="eye">The Path of the Fox</p>
<h2>狐道</h2>
<div class="r"></div>
<p>Let the kitsune spirit guide your brush through the way of Japanese.</p>
</div>
</div>
</div></body></html>
