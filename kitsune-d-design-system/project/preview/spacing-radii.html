<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.cell { display:flex; flex-direction:column; align-items:center; gap: 10px; }
.r { width: 80px; height: 50px; background: hsl(var(--card)); box-shadow: inset 0 0 0 1px hsl(30 12% 82% / .8); }
.label { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: hsl(var(--muted-foreground)); font-family: ui-monospace,Menlo,monospace; }
</style></head><body><div class="card">
<p class="eyebrow">Radii · Sharp-edge preference</p>
<div class="row">
<div class="cell"><div class="r" style="border-radius:0"></div><span class="label">0 · none</span></div>
<div class="cell"><div class="r" style="border-radius:1px"></div><span class="label">sm · 1px</span></div>
<div class="cell"><div class="r" style="border-radius:2px"></div><span class="label">base · 2px</span></div>
<div class="cell"><div class="r" style="border-radius:4px"></div><span class="label">lg · 4px (max)</span></div>
</div>
</div></body></html>
