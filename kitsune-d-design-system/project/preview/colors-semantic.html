<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.swatch { aspect-ratio: 1.4/1; border-radius: 2px; display:flex; flex-direction:column; justify-content:flex-end; padding: 8px 10px; color: #fff; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; box-shadow: inset 0 0 0 1px hsl(30 12% 82% / 0.6); }
.swatch .val { opacity:.8; text-transform:none; letter-spacing:.02em; font-family: ui-monospace,Menlo,monospace; font-size: 9px; margin-top: 2px; }
</style></head><body><div class="card">
<p class="eyebrow">Colors · Semantic</p>
<div class="row">
<div class="swatch" style="background:hsl(150 35% 35%)">Success<br><span class="val">Bamboo · 150 35% 35%</span></div>
<div class="swatch" style="background:hsl(35 80% 50%); color:#111">Warning<br><span class="val">Autumn · 35 80% 50%</span></div>
<div class="swatch" style="background:hsl(0 65% 42%)">Destructive<br><span class="val">0 65% 42%</span></div>
<div class="swatch" style="background:hsl(30 6% 10%)">Accent<br><span class="val">30 6% 10%</span></div>
</div>
</div></body></html>
