<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.wrap { position: relative; padding: 10px 0; min-height: 150px; display:flex; align-items:center; }
.wm { writing-mode: vertical-rl; font-family: var(--font-serif); font-weight: 700; color: hsl(var(--foreground) / .08); font-size: 110px; letter-spacing: .4em; line-height: 1; position: absolute; right: 10px; top: 0; user-select:none; }
.content { position: relative; z-index: 1; max-width: 65%; }
.content .eye { font-size: 9px; letter-spacing: .4em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0 0 8px; }
.content h2 { font-family: var(--font-serif); font-weight: 500; font-size: 36px; letter-spacing:.08em; margin: 0; color: hsl(var(--foreground)); }
.rule { width: 64px; height: 1px; background: hsl(var(--foreground) / .4); margin-top: 10px; }
.content p { font-size: 11px; color: hsl(var(--foreground) / .7); margin: 10px 0 0; font-style: italic; letter-spacing: .04em; }
</style></head><body><div class="card">
<p class="eyebrow">Brand · Kanji watermark + tagline</p>
<div class="wrap">
  <span class="wm">羊蹄</span>
  <div class="content">
    <p class="eye">The Path of the Fox</p>
    <h2>狐道</h2>
    <div class="rule"></div>
    <p>Let the kitsune spirit guide your brush through the way of Japanese.</p>
  </div>
</div>
</div></body></html>
