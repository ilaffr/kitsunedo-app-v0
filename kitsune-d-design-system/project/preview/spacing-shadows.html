<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:grid; grid-template-columns: repeat(4,1fr); gap: 20px; align-items: center; padding: 10px 0; }
.cell { display:flex; flex-direction:column; align-items:center; gap: 10px; }
.box { width: 100px; height: 60px; background: hsl(var(--card)); border-radius: 2px; }
.label { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: hsl(var(--muted-foreground)); font-family: ui-monospace,Menlo,monospace; text-align:center; }
</style></head><body><div class="card">
<p class="eyebrow">Shadows · Elevation</p>
<div class="row">
<div class="cell"><div class="box" style="box-shadow: 0 1px 2px hsl(30 10% 10% / 0.05)"></div><span class="label">sm</span></div>
<div class="cell"><div class="box" style="box-shadow: 0 2px 8px hsl(30 10% 10% / 0.07)"></div><span class="label">md</span></div>
<div class="cell"><div class="box" style="box-shadow: 0 12px 32px hsl(30 10% 10% / 0.1)"></div><span class="label">lg</span></div>
<div class="cell"><div class="box" style="box-shadow: 0 4px 16px hsl(5 78% 42% / 0.22)"></div><span class="label">vermillion glow</span></div>
</div>
</div></body></html>
