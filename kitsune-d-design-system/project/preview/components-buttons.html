<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:flex; gap: 14px; flex-wrap:wrap; align-items:center; }
.btn-ink { background: hsl(var(--foreground)); color: hsl(var(--background)); font-family: var(--font-serif); font-size: 11px; text-transform: uppercase; letter-spacing:.3em; font-weight:500; padding: 12px 22px; border:0; border-radius: 2px; cursor: pointer; box-shadow: 0 2px 8px hsl(30 10% 10% / 0.07); }
.btn-ink:hover { background: hsl(var(--foreground) / .88); }
.btn-vermillion { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); font-family: var(--font-serif); font-size: 11px; text-transform: uppercase; letter-spacing:.28em; font-weight:500; padding: 12px 22px; border:0; border-radius: 2px; cursor: pointer; box-shadow: 0 4px 16px hsl(5 78% 42% / .22); }
.btn-outline { background: transparent; color: hsl(var(--foreground)); font-family: var(--font-serif); font-size: 11px; text-transform: uppercase; letter-spacing:.3em; font-weight:500; padding: 10px 20px; border: 1px solid hsl(var(--foreground) / .25); border-radius: 2px; cursor: pointer; }
.btn-ghost { background: transparent; color: hsl(var(--muted-foreground)); font-family: var(--font-serif); font-size: 10px; text-transform: uppercase; letter-spacing:.25em; font-weight:500; padding: 8px 14px; border:0; cursor: pointer; }
</style></head><body><div class="card">
<p class="eyebrow">Components · Buttons</p>
<div class="row">
<button class="btn-ink">入る — Enter</button>
<button class="btn-vermillion">始める</button>
<button class="btn-outline">試す — Try</button>
<button class="btn-ghost">Forgot password?</button>
</div>
</div></body></html>
