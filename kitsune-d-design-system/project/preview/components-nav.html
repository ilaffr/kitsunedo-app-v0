<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: flex; align-items: center; gap: 0; background: hsl(var(--background) / .9); padding: 6px 8px; border-radius: 2px; width: fit-content; box-shadow: inset 0 0 0 1px hsl(30 12% 82% / 0.4); }
.item { position: relative; display:flex; flex-direction:column; align-items:center; justify-content:center; width: 72px; height: 60px; font-family: var(--font-serif); cursor:pointer; color: hsl(var(--muted-foreground)); }
.item .kanji { font-size: 18px; }
.item .lbl { font-size: 9px; letter-spacing: .25em; text-transform: uppercase; margin-top: 4px; color: hsl(var(--muted-foreground)); }
.item.active { color: hsl(var(--background)); z-index: 1; }
.item.active .lbl { color: hsl(var(--background)); }
.item.active::before { content:''; position:absolute; inset: -5% -15%; background: radial-gradient(ellipse at 30% 50%, hsl(var(--foreground)) 0%, hsl(var(--foreground) / 0.8) 35%, transparent 70%), radial-gradient(ellipse at 80% 55%, hsl(var(--foreground) / 0.6) 0%, transparent 55%); transform: skewX(-8deg); border-radius: 50%; z-index:-1; filter: blur(.4px); }
</style></head><body><div class="card">
<p class="eyebrow">Components · Nav with brush-stroke active</p>
<div class="row">
<div class="item"><span class="kanji">道</span><span class="lbl">Path</span></div>
<div class="item active"><span class="kanji">学</span><span class="lbl">Learn</span></div>
<div class="item"><span class="kanji">練</span><span class="lbl">Practice</span></div>
<div class="item"><span class="kanji">績</span><span class="lbl">Stats</span></div>
<div class="item"><span class="kanji">栄</span><span class="lbl">Honors</span></div>
</div>
</div></body></html>
