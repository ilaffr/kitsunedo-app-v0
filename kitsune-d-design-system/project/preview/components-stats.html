<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat { padding: 14px; display:flex; align-items:center; gap: 12px; }
.icon { width: 40px; height: 40px; display:flex; align-items:center; justify-content:center; }
.icon svg { width: 20px; height: 20px; stroke-width: 1.5; fill: none; }
.icon.vermillion { color: hsl(var(--primary)); }
.icon.ink { color: hsl(var(--foreground)); }
.icon.muted { color: hsl(var(--foreground) / .7); }
.meta { min-width: 0; }
.meta .lbl { font-size: 9px; text-transform: uppercase; letter-spacing:.28em; color: hsl(var(--muted-foreground)); margin:0 0 2px; font-weight:500; }
.meta .val { font-family: var(--font-serif); font-weight: 500; font-size: 20px; margin:0; letter-spacing:.03em; }
.meta .sub { font-size: 10px; color: hsl(var(--muted-foreground)); margin:1px 0 0; letter-spacing: .04em; }
.v { color: hsl(var(--primary)); }
.i { color: hsl(var(--foreground)); }
</style></head><body><div class="card">
<p class="eyebrow">Components · Stat cards</p>
<div class="row">
<div class="washi-card stat"><div class="icon vermillion"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div><div class="meta"><p class="lbl">Streak</p><p class="val v">12日</p><p class="sub">days of honor</p></div></div>
<div class="washi-card stat"><div class="icon ink"><svg viewBox="0 0 24 24" stroke="currentColor"><polygon points="12 2 15 8 22 9 17 14 18 21 12 18 6 21 7 14 2 9 9 8"/></svg></div><div class="meta"><p class="lbl">Spirit</p><p class="val i">4,820</p><p class="sub">total XP</p></div></div>
<div class="washi-card stat"><div class="icon muted"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><div class="meta"><p class="lbl">Scrolls</p><p class="val">7</p><p class="sub">completed</p></div></div>
<div class="washi-card stat"><div class="icon muted"><svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="meta"><p class="lbl">Sessions</p><p class="val">24</p><p class="sub">practices</p></div></div>
</div>
</div></body></html>
