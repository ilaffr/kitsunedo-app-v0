<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kitsune-dō — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Lesson.jsx"></script>
<script type="text/babel" src="FoxAndAuth.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(true);
  const [view, setView] = useState('dashboard');

  if (!authed) return <Auth onSignIn={() => setAuthed(true)} />;

  const header = {
    dashboard: { kanji:'道', title:'The Path', subtitle:'本日 — DASHBOARD' },
    lessons:   { kanji:'学', title:'Study', subtitle:'学習 — LESSONS' },
    lesson:    { kanji:'巻', title:'Scroll 03 · Shopping & numbers', subtitle:'巻物 — LESSON' },
    kana:      { kanji:'練', title:'Kana Primer', subtitle:'練習 — TRAIN' },
    bestiary:  { kanji:'績', title:'Bestiary', subtitle:'妖怪 — SPIRITS' },
    profile:   { kanji:'栄', title:'Honor', subtitle:'栄誉 — PROFILE' },
  }[view] || { kanji:'道', title:'The Path', subtitle:'DASHBOARD' };

  const activeNav = view === 'lesson' ? 'lessons' : view;

  return (
    <div style={{display:'flex', minHeight:'100vh'}}>
      <Sidebar active={activeNav} onNav={setView} />
      <div style={{flex:1, display:'flex', flexDirection:'column', minWidth: 0}}>
        <Header {...header} />
        {view === 'dashboard' && <Dashboard onOpen={setView} />}
        {view === 'lessons'   && <Dashboard onOpen={setView} />}
        {view === 'lesson'    && <LessonView onBack={() => setView('dashboard')} />}
        {view === 'kana'      && <KanaView />}
        {view === 'bestiary'  && <BestiaryView />}
        {view === 'profile'   && <BestiaryView />}
      </div>
      <FoxMascot jp="素晴らしい." message="Your spirit grows stronger. Three scrolls remain today." />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
